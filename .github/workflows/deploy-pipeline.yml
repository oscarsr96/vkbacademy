name: Deploy pipeline (PRE → PROD)

# Pipeline de despliegue progresivo:
#
#   push a main → tests → migrate PRE → deploy PRE → smoke PRE
#       → (aprobación) → migrate PROD → deploy PROD → smoke PROD → promote
#
# Entornos GitHub esperados (Settings → Environments):
#   - pre          (sin approval)
#   - prod-canary  (con required reviewers)
#   - prod         (con required reviewers)
#
# Secrets requeridos (repository-level):
#   RENDER_API_KEY             → API key de cuenta Render
#   RENDER_SERVICE_ID_PRE      → id del servicio API PRE en Render (srv-...)
#   RENDER_SERVICE_ID_PROD     → id del servicio API PROD en Render (srv-...)
#   VERCEL_TOKEN               → token de cuenta Vercel
#   VERCEL_ORG_ID              → id de la organización Vercel
#   VERCEL_PROJECT_ID_PRE      → id del proyecto web PRE en Vercel
#   VERCEL_PROJECT_ID_PROD     → id del proyecto web PROD en Vercel
#
# Secrets por environment (pre / prod-canary / prod):
#   DATABASE_URL               → connection string de la BD (Neon)
#
# Variables por environment:
#   SMOKE_API_URL              → URL base de la API a probar
#   SMOKE_WEB_URL              → URL base del frontend a probar

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Tests y build ────────────────────────────────────────────────────────
  test:
    name: Tests y type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build paquete shared
        run: pnpm --filter @vkbacademy/shared build

      - name: Generar cliente Prisma
        run: pnpm --filter @vkbacademy/api exec prisma generate

      - name: Tests unitarios (API)
        run: pnpm --filter @vkbacademy/api test -- --passWithNoTests

      - name: Type check (web)
        run: pnpm --filter @vkbacademy/web lint

      - name: Build web
        run: pnpm --filter @vkbacademy/web build

      - name: Build API
        run: pnpm --filter @vkbacademy/api exec nest build

  # ── 2a. Migraciones de BD en PRE ────────────────────────────────────────────
  migrate-pre:
    name: Migraciones BD (PRE)
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pre
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build paquete shared
        run: pnpm --filter @vkbacademy/shared build

      - name: Generar cliente Prisma
        run: pnpm --filter @vkbacademy/api exec prisma generate

      - name: Aplicar migraciones pendientes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @vkbacademy/api run migrate:deploy

  # ── 2b. Deploy a PRE ────────────────────────────────────────────────────────
  deploy-pre:
    name: Deploy a PRE
    needs: migrate-pre
    runs-on: ubuntu-latest
    environment:
      name: pre
      url: ${{ vars.SMOKE_WEB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Deploy API a Render (PRE)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_PRE }}
        run: |
          API="https://api.render.com/v1/services/$RENDER_SERVICE_ID"
          AUTH="Authorization: Bearer $RENDER_API_KEY"

          # Trigger deploy — la API puede devolver body vacío si ya hay uno en cola
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "$API/deploys" \
            -H "$AUTH" -H "Content-Type: application/json" -d '{}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          DEPLOY_ID=$(echo "$BODY" | jq -r '.id // empty' 2>/dev/null || true)

          # Si no hubo ID, coger el deploy más reciente
          if [ -z "$DEPLOY_ID" ]; then
            echo "POST devolvió vacío (HTTP $HTTP_CODE) — buscando deploy más reciente..."
            DEPLOY_ID=$(curl -sS "$API/deploys?limit=1" -H "$AUTH" \
              | jq -r '.[0].deploy.id // .[0].id // empty' 2>/dev/null || true)
          fi

          if [ -z "$DEPLOY_ID" ]; then
            echo "No se encontró ningún deploy"
            exit 1
          fi

          echo "Monitoreando deploy: $DEPLOY_ID"

          for i in $(seq 1 40); do
            STATUS=$(curl -sS "$API/deploys/$DEPLOY_ID" -H "$AUTH" \
              | jq -r '.status // empty' 2>/dev/null || echo "unknown")

            echo "Intento $i — status: $STATUS"

            case "$STATUS" in
              live)
                echo "Deploy PRE completado"
                exit 0
                ;;
              deactivated|build_failed|update_failed|canceled|pre_deploy_failed)
                echo "Deploy PRE falló con status: $STATUS"
                exit 1
                ;;
            esac
            sleep 15
          done
          echo "Timeout esperando deploy PRE"
          exit 1

      - name: Instalar dependencias (para Vercel build)
        run: pnpm install --frozen-lockfile

      - name: Deploy web a Vercel (PRE)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRE }}
        run: |
          npm install -g vercel@37.14.0
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  # ── 3. Smoke tests contra PRE ───────────────────────────────────────────────
  smoke-pre:
    name: Smoke tests PRE
    needs: deploy-pre
    runs-on: ubuntu-latest
    environment:
      name: pre
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build paquete shared
        run: pnpm --filter @vkbacademy/shared build

      - name: Generar cliente Prisma
        run: pnpm --filter @vkbacademy/api exec prisma generate

      - name: Esperar a que la API PRE responda
        env:
          SMOKE_API_URL: ${{ vars.SMOKE_API_URL }}
        run: |
          for i in $(seq 1 20); do
            if curl -fsS --max-time 10 "$SMOKE_API_URL/api/health" > /dev/null 2>&1; then
              echo "API PRE lista en intento $i"
              exit 0
            fi
            echo "Esperando API PRE... intento $i"
            sleep 15
          done
          echo "API PRE no respondió tras 20 intentos (cold start de Render)"
          exit 1

      - name: Ejecutar smoke tests contra PRE
        env:
          SMOKE_API_URL: ${{ vars.SMOKE_API_URL }}
          SMOKE_WEB_URL: ${{ vars.SMOKE_WEB_URL }}
        run: pnpm --filter @vkbacademy/api test:smoke

  # ── 4a. Migraciones de BD en PROD ──────────────────────────────────────────
  migrate-prod:
    name: Migraciones BD (PROD)
    needs: smoke-pre
    runs-on: ubuntu-latest
    environment:
      name: prod-canary
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build paquete shared
        run: pnpm --filter @vkbacademy/shared build

      - name: Generar cliente Prisma
        run: pnpm --filter @vkbacademy/api exec prisma generate

      - name: Aplicar migraciones pendientes en PROD
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @vkbacademy/api run migrate:deploy

  # ── 4b. Deploy a PROD ──────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy PROD
    needs: migrate-prod
    runs-on: ubuntu-latest
    environment:
      name: prod-canary
      url: ${{ vars.SMOKE_WEB_URL }}
    steps:
      - name: Deploy API a Render (PROD)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_PROD }}
        run: |
          API="https://api.render.com/v1/services/$RENDER_SERVICE_ID"
          AUTH="Authorization: Bearer $RENDER_API_KEY"

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "$API/deploys" \
            -H "$AUTH" -H "Content-Type: application/json" -d '{}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          DEPLOY_ID=$(echo "$BODY" | jq -r '.id // empty' 2>/dev/null || true)

          if [ -z "$DEPLOY_ID" ]; then
            echo "POST devolvió vacío (HTTP $HTTP_CODE) — buscando deploy más reciente..."
            DEPLOY_ID=$(curl -sS "$API/deploys?limit=1" -H "$AUTH" \
              | jq -r '.[0].deploy.id // .[0].id // empty' 2>/dev/null || true)
          fi

          if [ -z "$DEPLOY_ID" ]; then
            echo "No se encontró ningún deploy"
            exit 1
          fi

          echo "Monitoreando deploy: $DEPLOY_ID"

          for i in $(seq 1 40); do
            STATUS=$(curl -sS "$API/deploys/$DEPLOY_ID" -H "$AUTH" \
              | jq -r '.status // empty' 2>/dev/null || echo "unknown")

            echo "Intento $i — status: $STATUS"

            case "$STATUS" in
              live)
                echo "Deploy PROD completado"
                exit 0
                ;;
              deactivated|build_failed|update_failed|canceled|pre_deploy_failed)
                echo "Deploy PROD falló con status: $STATUS"
                exit 1
                ;;
            esac
            sleep 15
          done
          echo "Timeout esperando deploy PROD"
          exit 1

      # Vercel PROD no se despliega aquí — la Git integration de Vercel
      # ya detecta el push a main y despliega automáticamente.
      # Solo desplegamos la API (Render) desde el pipeline.
      - name: Verificar que Vercel PROD está respondiendo
        run: |
          for i in $(seq 1 10); do
            if curl -fsS --max-time 10 "${{ vars.SMOKE_WEB_URL }}/" > /dev/null 2>&1; then
              echo "Vercel PROD respondiendo en intento $i"
              exit 0
            fi
            echo "Esperando Vercel PROD... intento $i"
            sleep 10
          done
          echo "Vercel PROD no respondió"
          exit 1

  # ── 5. Smoke tests contra PROD ─────────────────────────────────────────────
  smoke-prod:
    name: Smoke tests PROD
    needs: deploy-prod
    runs-on: ubuntu-latest
    environment:
      name: prod-canary
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build paquete shared
        run: pnpm --filter @vkbacademy/shared build

      - name: Generar cliente Prisma
        run: pnpm --filter @vkbacademy/api exec prisma generate

      - name: Esperar a que la API PROD responda
        env:
          SMOKE_API_URL: ${{ vars.SMOKE_API_URL }}
        run: |
          for i in $(seq 1 20); do
            if curl -fsS --max-time 10 "$SMOKE_API_URL/api/health" > /dev/null 2>&1; then
              echo "API PROD lista en intento $i"
              exit 0
            fi
            echo "Esperando API PROD... intento $i"
            sleep 15
          done
          exit 1

      - name: Ejecutar smoke tests contra PROD
        env:
          SMOKE_API_URL: ${{ vars.SMOKE_API_URL }}
          SMOKE_WEB_URL: ${{ vars.SMOKE_WEB_URL }}
        run: pnpm --filter @vkbacademy/api test:smoke

  # ── 6. Promover a PROD 100% tráfico ─────────────────────────────────────────
  promote-prod:
    name: Promover a PROD (100%)
    needs: smoke-prod
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: ${{ vars.SMOKE_WEB_URL }}
    steps:
      - name: Confirmar promoción
        run: |
          echo "Smoke tests PROD superados. Render/Vercel ya sirven la versión nueva."
          echo "Promoción confirmada."

      - name: Verificación final post-promoción
        env:
          SMOKE_API_URL: ${{ vars.SMOKE_API_URL }}
        run: |
          for i in 1 2 3; do
            if curl -fsS --max-time 10 "$SMOKE_API_URL/api/health" | grep -q '"status":"ok"'; then
              echo "Health check PROD OK ($i/3)"
              sleep 5
            else
              echo "Health check PROD FALLÓ en intento $i"
              exit 1
            fi
          done
